name: Flask Docker CI

# Trigger workflow on push or pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t flask-docker-project .

    - name: Run Docker container for test
      run: |
        docker run -d -p 5000:5000 --name flask-test flask-docker-project
        sleep 5
        docker ps
        docker stop flask-test
        docker rm flask-test
